name: squeeze-vault-executor
version: 1.0.0

description: |
  Crypto execution intent engine for autonomous trading agents.

  Call query_execution_intent with a symbol (e.g. ETH/USDT), timeframe,
  and current position state. Receive one of five deterministic signals
  telling you exactly what to do next:

  - EXECUTE_INITIAL_ENTRY       — open a new position now
  - EXECUTE_TRANCHE_AVG_DOWN    — add to existing position (drawdown tier escalation)
  - EXECUTE_TAKE_PROFIT_EXIT    — close position, profit target reached
  - EXECUTE_STRUCTURAL_STOP_OUT — close position immediately, anchor EMA lost
  - MAINTAIN_STATE              — hold, no action required

  Call get_ema_matrix to get raw EMA ribbon values for a symbol without
  triggering intent evaluation — useful for agents that apply their own logic.

  Data source: live Binance order book via CCXT (no simulation, no delayed feed).
  Auth: x402 XRPL/RLUSD micropayment header required on each call.

startCommand:
  type: sse
  url: https://squeezeos-api-1.onrender.com/mcp/sse

configSchema:
  type: object
  properties:
    xrpl_tx_hash:
      type: string
      description: "XRPL transaction hash proving RLUSD micropayment to access premium endpoints"
  required: []

license: Proprietary
homepage: https://scriptmasterlabs.com
repository: https://github.com/timwal78/squeezeos-api
author:
  name: ScriptMasterLabs
  url: https://scriptmasterlabs.com

tags:
  - trading
  - crypto
  - signals
  - ema
  - fibonacci
  - institutional
  - defi
  - autonomous-agents
  - xrpl
  - rlusd
  - base-l2
  - non-custodial

categories:
  - finance
  - trading
  - market-data
  - crypto

tools:
  - name: query_execution_intent
    description: "Live 5-EMA matrix execution intent for any CCXT crypto pair. Returns EXECUTE_INITIAL_ENTRY, EXECUTE_TRANCHE_AVG_DOWN, EXECUTE_TAKE_PROFIT_EXIT, EXECUTE_STRUCTURAL_STOP_OUT, or MAINTAIN_STATE."
    cost: "x402 XRPL/RLUSD micropayment"

  - name: get_ema_matrix
    description: "Current EMA_55/89/144/233/365 ribbon values for a symbol — no intent evaluation."
    cost: "x402 XRPL/RLUSD micropayment"
